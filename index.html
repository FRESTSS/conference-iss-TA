<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конференции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { transition: all 0.2s ease; }
        body { background: linear-gradient(135deg, #eef2f9 0%, #dfe6f0 100%); font-family: 'Segoe UI', Roboto, sans-serif; padding-bottom: 2rem; }
        .main-card { background: rgba(255,255,255,0.92); backdrop-filter: blur(3px); border-radius: 2rem; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25); padding: 1.8rem; margin-top: 1rem; }
        h1 { font-weight: 800; background: linear-gradient(120deg, #0b2b5c, #1e4a76); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 12px; }
        .btn-primary { background: linear-gradient(95deg, #1e4663, #143450); border: none; border-radius: 60px; padding: 10px 20px; }
        .btn-primary:hover { transform: translateY(-2px); }
        .table { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        .table thead th { background: #0f2c44; color: white; }
        .badge-level { padding: 6px 14px; border-radius: 60px; }
        .badge-inner { background: #2c7da0; color: white; }
        .badge-reg { background: #2a9d8f; color: white; }
        .badge-vseross { background: #e9c46a; color: #2c3e2f; }
        .badge-int { background: #9b5de5; color: white; }
        @media (max-width: 768px) {
            .table, .table tbody, .table tr, .table td { display: block; }
            .table thead { display: none; }
            .table tr { margin-bottom: 20px; border-radius: 20px; background: white; padding: 12px; }
            .table td { display: flex; justify-content: space-between; padding: 8px 0; }
            .table td:before { content: attr(data-label); font-weight: bold; width: 40%; }
        }
    </style>
</head>
<body class="container py-4">
<div class="main-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-calendar2-week"></i> Конференции</h1>
        <button class="btn btn-primary" id="addButton"><i class="bi bi-plus-lg"></i> Новая</button>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-4"><input type="text" id="searchInput" class="form-control" placeholder="Поиск"></div>
        <div class="col-md-3">
            <select id="levelFilter" class="form-select">
                <option value="all">Все уровни</option>
                <option value="internal">Внутриколледная</option>
                <option value="regional">Региональная</option>
                <option value="all-russia">Всероссийская</option>
                <option value="international">Международная</option>
            </select>
        </div>
        <div class="col-md-3">
            <select id="statusFilter" class="form-select">
                <option value="all">Все статусы</option>
                <option value="planned">Запланирована</option>
                <option value="active">Идёт</option>
                <option value="completed">Завершена</option>
            </select>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>#</th><th>Название</th><th>Даты</th><th>Уровень</th><th>Место</th><th>Статус</th><th></th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="emptyState" class="alert text-center d-none">Нет конференций</div>
</div>

<div class="modal fade" id="confModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle">Конференция</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="confForm">
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label>Название</label><input type="text" id="title" class="form-control" required></div>
                    <div class="row mb-3"><div class="col"><label>Дата начала</label><input type="date" id="dateStart" class="form-control" required></div><div class="col"><label>Дата окончания</label><input type="date" id="dateEnd" class="form-control" required></div></div>
                    <div class="mb-3"><label>Уровень</label><select id="level" class="form-select"><option value="internal">Внутриколледная</option><option value="regional">Региональная</option><option value="all-russia">Всероссийская</option><option value="international">Международная</option></select></div>
                    <div class="mb-3"><label>Статус</label><select id="status" class="form-select"><option value="planned">Запланирована</option><option value="active">Идёт</option><option value="completed">Завершена</option></select></div>
                    <div class="mb-3"><label>Участники</label><input type="number" id="participants" class="form-control" value="0"></div>
                    <div class="mb-3"><label>Место</label><input type="text" id="location" class="form-control"></div>
                    <div class="mb-3"><label>Организатор</label><input type="text" id="organizer" class="form-control"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button><button type="submit" class="btn btn-primary">Сохранить</button></div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== ВСТАВЬТЕ ВАШИ ДАННЫЕ СЮДА ==========
    const MY_SUPABASE_URL = 'https://hdsbczfbokmcjvdolvmo.supabase.co';
    const MY_SUPABASE_KEY = 'sb_publishable_zf775epbJGZFo2CDPDkJ1A_SYfnCJbm';
    // ============================================

    // Создаём клиент Supabase с уникальным именем переменной
    const supabaseClient = window.supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_KEY);
    
    let modalBs = null;
    let conferencesList = [];

    document.addEventListener('DOMContentLoaded', () => {
        modalBs = new bootstrap.Modal(document.getElementById('confModal'));
        document.getElementById('addButton').onclick = () => openForm();
        document.getElementById('confForm').onsubmit = saveConference;
        document.getElementById('searchInput').oninput = () => renderTable();
        document.getElementById('levelFilter').onchange = () => renderTable();
        document.getElementById('statusFilter').onchange = () => renderTable();
        loadConferences();
    });

    async function loadConferences() {
        const { data, error } = await supabaseClient.from('conferences').select('*');
        if (error) {
            console.error(error);
            alert('Ошибка загрузки: ' + error.message);
            return;
        }
        conferencesList = data || [];
        renderTable();
    }

    function renderTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const levelVal = document.getElementById('levelFilter').value;
        const statusVal = document.getElementById('statusFilter').value;
        const filtered = conferencesList.filter(item => 
            (item.title.toLowerCase().includes(searchText) || (item.organizer || '').toLowerCase().includes(searchText)) &&
            (levelVal === 'all' || item.level === levelVal) &&
            (statusVal === 'all' || item.status === statusVal)
        );
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (filtered.length === 0) {
            document.getElementById('emptyState').classList.remove('d-none');
        } else {
            document.getElementById('emptyState').classList.add('d-none');
        }
        const levelNames = { internal: 'Внутриколледная', regional: 'Региональная', 'all-russia': 'Всероссийская', international: 'Международная' };
        const statusHtml = { planned: '<span class="badge bg-info">Запланирована</span>', active: '<span class="badge bg-warning">Идёт</span>', completed: '<span class="badge bg-success">Завершена</span>' };
        const badgeClass = { 'all-russia': 'badge-vseross', international: 'badge-int', regional: 'badge-reg' };
        filtered.forEach((item, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = idx+1;
            row.insertCell(1).innerHTML = `<b>${escapeText(item.title)}</b>${item.organizer ? `<br><small>${escapeText(item.organizer)}</small>` : ''}`;
            row.insertCell(2).innerHTML = `<i class="bi bi-calendar3"></i> ${formatDate(item.dateStart)} — ${formatDate(item.dateEnd)}`;
            row.insertCell(3).innerHTML = `<span class="badge-level ${badgeClass[item.level] || 'badge-inner'}">${levelNames[item.level]}</span>`;
            row.insertCell(4).innerHTML = escapeText(item.location || '—');
            row.insertCell(5).innerHTML = statusHtml[item.status] || '—';
            const actions = row.insertCell(6);
            const editBtn = document.createElement('button'); editBtn.className = 'btn btn-sm btn-outline-primary me-1'; editBtn.innerHTML = '<i class="bi bi-pencil"></i>'; editBtn.onclick = () => openForm(item.id);
            const delBtn = document.createElement('button'); delBtn.className = 'btn btn-sm btn-outline-danger'; delBtn.innerHTML = '<i class="bi bi-trash"></i>'; delBtn.onclick = () => deleteConference(item.id);
            actions.appendChild(editBtn); actions.appendChild(delBtn);
        });
        // Для адаптива
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            const cells = tr.children;
            if(cells[0]) cells[0].setAttribute('data-label', '#');
            if(cells[1]) cells[1].setAttribute('data-label', 'Название');
            if(cells[2]) cells[2].setAttribute('data-label', 'Даты');
            if(cells[3]) cells[3].setAttribute('data-label', 'Уровень');
            if(cells[4]) cells[4].setAttribute('data-label', 'Место');
            if(cells[5]) cells[5].setAttribute('data-label', 'Статус');
            if(cells[6]) cells[6].setAttribute('data-label', 'Действия');
        });
    }

    function openForm(id = null) {
        document.getElementById('confForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-circle"></i> Добавить конференцию';
        if (id) {
            const item = conferencesList.find(c => c.id === id);
            if (item) {
                document.getElementById('editId').value = item.id;
                document.getElementById('title').value = item.title;
                document.getElementById('dateStart').value = item.dateStart;
                document.getElementById('dateEnd').value = item.dateEnd;
                document.getElementById('level').value = item.level;
                document.getElementById('status').value = item.status;
                document.getElementById('participants').value = item.participants;
                document.getElementById('location').value = item.location || '';
                document.getElementById('organizer').value = item.organizer || '';
                document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square"></i> Редактировать';
            }
        }
        modalBs.show();
    }

    async function saveConference(e) {
        e.preventDefault();
        const startDate = document.getElementById('dateStart').value;
        const endDate = document.getElementById('dateEnd').value;
        if (startDate > endDate) {
            alert('Дата окончания не может быть раньше даты начала');
            return;
        }
        const editId = document.getElementById('editId').value;
        const conference = {
            title: document.getElementById('title').value.trim(),
            dateStart: startDate,
            dateEnd: endDate,
            level: document.getElementById('level').value,
            status: document.getElementById('status').value,
            participants: parseInt(document.getElementById('participants').value) || 0,
            location: document.getElementById('location').value.trim(),
            organizer: document.getElementById('organizer').value.trim()
        };
        let result;
        if (editId) {
            result = await supabaseClient.from('conferences').update(conference).eq('id', parseInt(editId));
        } else {
            result = await supabaseClient.from('conferences').insert([conference]);
        }
        if (result.error) {
            alert('Ошибка сохранения: ' + result.error.message);
            console.error(result.error);
        } else {
            modalBs.hide();
            await loadConferences();
        }
    }

    async function deleteConference(id) {
        if (confirm('Удалить конференцию?')) {
            const { error } = await supabaseClient.from('conferences').delete().eq('id', id);
            if (error) {
                alert('Ошибка удаления: ' + error.message);
                console.error(error);
            } else {
                await loadConferences();
            }
        }
    }

    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('ru-RU'); }
    function escapeText(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
</script>
</body>
</html>
